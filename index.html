<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoinMine — добывай монеты</title>
    <style>
        /* ... все стили из предыдущей версии ... */
        /* (я их не дублирую для экономии места, но они должны быть) */
    </style>
</head>
<body>
    <!-- ... весь HTML из предыдущей версии ... -->

    <div id="_t"></div>

    <script>
        // ============================================================
        // 1. КОНФИГУРАЦИЯ
        // ============================================================
        const SUPABASE_URL = 'https://mazccbkzurbryzusajqc.supabase.co/rest/v1/';
        const SUPABASE_ANON_KEY = 'sb_publishable_GLQvPbCZrDYgd7FCSp861g_poX1-Hwy';

        // ============================================================
        // 2. ГЕНЕРАЦИЯ ID УСТРОЙСТВА
        // ============================================================
        function getDeviceId() {
            let deviceId = localStorage.getItem('coinmine_device_id');
            if (!deviceId) {
                const components = [
                    navigator.userAgent,
                    navigator.language,
                    screen.width + 'x' + screen.height,
                    screen.colorDepth,
                    navigator.hardwareConcurrency || 'unknown',
                    new Date().getTimezoneOffset()
                ];
                const str = components.join('|');
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                deviceId = 'device_' + Math.abs(hash).toString(36) + '_' + Date.now().toString(36).slice(-4);
                localStorage.setItem('coinmine_device_id', deviceId);
            }
            return deviceId;
        }

        function getDeviceName() {
            let name = localStorage.getItem('coinmine_device_name');
            if (!name) {
                const ua = navigator.userAgent;
                if (ua.includes('Android')) name = '📱 Android';
                else if (ua.includes('iPhone') || ua.includes('iPad')) name = '📱 iOS';
                else if (ua.includes('Windows')) name = '💻 Windows';
                else if (ua.includes('Mac')) name = '💻 Mac';
                else name = '🌐 Браузер';
                localStorage.setItem('coinmine_device_name', name);
            }
            return name;
        }

        const DEVICE_ID = getDeviceId();
        const DEVICE_NAME = getDeviceName();

        console.log('🆔 ID устройства:', DEVICE_ID);
        console.log('📱 Имя устройства:', DEVICE_NAME);
        console.log('⏳ Инициализация...');

        // ============================================================
        // 3. ДАННЫЕ ПО УМОЛЧАНИЮ
        // ============================================================
        const G = {
            coins: 150,
            farms: 0,
            refs: 0,
            keys: 0,
            lastFarm: 0,
            farmLv: 1,
            name: 'Шахтёр',
            nicks: { p: [], a: null },
            shards: {},
            clan: null,
            clanLF: 0,
            promos: {},
            missions: { active: null, lastReset: 0 },
            auctionBid: 0,
            chests: 0,
            refCode: '',
            activatedRef: null,
            refEarnings: 0
        };

        let GLOBAL_BOSS = { idx: 0, hp: 1000, lastRespawn: 0 };
        let USER_DEVICES = [];
        let saveTimeout = null;

        // ============================================================
        // 4. ПЕРЕМЕННЫЕ ДЛЯ SUPABASE
        // ============================================================
        let supabaseClient = null; // ← ИЗМЕНЕНО: supabase → supabaseClient
        let currentUser = null;
        let currentUserId = null;
        let isAuthMode = 'login';
        let _pendingFn = null;
        let supabaseLoaded = false;

        // ============================================================
        // 5. ЗАГРУЗКА SUPABASE SDK
        // ============================================================
        function initSupabase() {
            try {
                if (typeof supabaseJs !== 'undefined' && !supabaseLoaded) {
                    const { createClient } = supabaseJs;
                    supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    supabaseLoaded = true;
                    console.log('✅ Supabase инициализирован');
                    document.getElementById('authStatus').textContent = '✅ Готово к входу';
                    document.getElementById('authStatus').style.color = 'var(--grn)';
                    clearInterval(loadingInterval);
                    checkAuth();
                } else if (!supabaseLoaded) {
                    console.log('⏳ Ожидание загрузки Supabase...');
                    setTimeout(initSupabase, 100);
                }
            } catch (e) {
                console.error('❌ Ошибка инициализации Supabase:', e);
                document.getElementById('authStatus').textContent = '❌ Ошибка подключения';
                document.getElementById('authStatus').style.color = 'var(--red)';
            }
        }

        // Индикатор загрузки
        let loadingDots = 0;
        const loadingInterval = setInterval(() => {
            const status = document.getElementById('authStatus');
            if (!supabaseLoaded) {
                loadingDots = (loadingDots % 3) + 1;
                status.textContent = '⏳ Подключение' + '.'.repeat(loadingDots);
                status.style.color = 'var(--gld)';
            }
        }, 500);

        // Загружаем Supabase SDK
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        script.onload = function() {
            console.log('📦 Supabase SDK загружен');
            initSupabase();
        };
        script.onerror = function() {
            console.error('❌ Ошибка загрузки Supabase SDK');
            document.getElementById('authStatus').textContent = '❌ Ошибка загрузки SDK';
            document.getElementById('authStatus').style.color = 'var(--red)';
            clearInterval(loadingInterval);
        };
        document.head.appendChild(script);

        // Запасной вариант - если скрипт уже загружен
        setTimeout(() => {
            if (!supabaseLoaded && typeof supabaseJs !== 'undefined') {
                initSupabase();
            }
        }, 2000);

        // ============================================================
        // 6. ФУНКЦИИ АВТОРИЗАЦИИ
        // ============================================================
        function toggleAuthMode() {
            if (!supabaseClient) {
                document.getElementById('authStatus').textContent = '⏳ Загрузка...';
                return;
            }
            isAuthMode = isAuthMode === 'login' ? 'register' : 'login';
            const sub = document.getElementById('authSub');
            const btn = document.getElementById('authBtn');
            const toggle = document.getElementById('authToggle');
            if (isAuthMode === 'login') {
                sub.textContent = 'Войдите в свой аккаунт';
                btn.textContent = 'Войти';
                toggle.textContent = 'Нет аккаунта? Зарегистрироваться';
            } else {
                sub.textContent = 'Создайте новый аккаунт';
                btn.textContent = 'Зарегистрироваться';
                toggle.textContent = 'Уже есть аккаунт? Войти';
            }
        }

        async function handleAuth() {
            if (!supabaseClient) {
                document.getElementById('authStatus').textContent = '⏳ Подождите, идёт загрузка...';
                document.getElementById('authStatus').style.color = 'var(--gld)';
                return;
            }

            const email = document.getElementById('authEmail').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            const status = document.getElementById('authStatus');

            if (!email || !pass) {
                status.textContent = 'Заполните все поля';
                status.style.color = 'var(--red)';
                return;
            }
            if (pass.length < 6) {
                status.textContent = 'Пароль должен быть минимум 6 символов';
                status.style.color = 'var(--red)';
                return;
            }

            try {
                let result;
                if (isAuthMode === 'login') {
                    result = await supabaseClient.auth.signInWithPassword({ email, password: pass });
                } else {
                    result = await supabaseClient.auth.signUp({ email, password: pass });
                }

                if (result.error) {
                    status.textContent = 'Ошибка: ' + result.error.message;
                    status.style.color = 'var(--red)';
                    return;
                }

                if (result.data.user) {
                    currentUser = result.data.user;
                    currentUserId = currentUser.id;
                    status.textContent = isAuthMode === 'login' ? '✅ Вход выполнен!' : '✅ Регистрация успешна!';
                    status.style.color = 'var(--grn)';
                    
                    if (isAuthMode === 'register') {
                        const devices = [{
                            id: DEVICE_ID,
                            name: DEVICE_NAME,
                            last_active: new Date().toISOString(),
                            current: true
                        }];
                        await supabaseClient
                            .from('users')
                            .upsert({
                                id: currentUserId,
                                email: currentUser.email,
                                data: G,
                                boss: GLOBAL_BOSS,
                                devices: devices,
                                created_at: new Date().toISOString(),
                                updated_at: new Date().toISOString()
                            });
                    }
                    
                    await loadUserData();
                    showMainApp();
                } else {
                    status.textContent = 'Проверьте почту для подтверждения';
                    status.style.color = 'var(--gld)';
                }
            } catch (e) {
                status.textContent = 'Ошибка: ' + e.message;
                status.style.color = 'var(--red)';
            }
        }

        async function checkAuth() {
            if (!supabaseClient) {
                console.log('⏳ Supabase ещё не инициализирован');
                return;
            }
            try {
                const { data } = await supabaseClient.auth.getSession();
                if (data?.session?.user) {
                    currentUser = data.session.user;
                    currentUserId = currentUser.id;
                    await loadUserData();
                    showMainApp();
                }
            } catch (e) {
                console.log('Не авторизован');
            }
        }

        // ============================================================
        // 7. РАБОТА С ДАННЫМИ
        // ============================================================
        async function loadUserData() {
            if (!supabaseClient || !currentUserId) return;
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('id', currentUserId)
                    .single();

                if (error && error.code !== 'PGRST116') {
                    console.error('Ошибка загрузки:', error);
                    return;
                }

                if (data) {
                    const p = data.data || {};
                    Object.keys(G).forEach(k => {
                        if (p[k] !== undefined) G[k] = p[k];
                    });
                    if (data.boss) GLOBAL_BOSS = data.boss;
                    if (data.devices) USER_DEVICES = data.devices;
                    await updateDeviceActivity();
                } else {
                    G.refCode = currentUserId.substring(0, 8);
                    USER_DEVICES = [{
                        id: DEVICE_ID,
                        name: DEVICE_NAME,
                        last_active: new Date().toISOString(),
                        current: true
                    }];
                    await supabaseClient
                        .from('users')
                        .insert({
                            id: currentUserId,
                            email: currentUser.email,
                            data: G,
                            boss: GLOBAL_BOSS,
                            devices: USER_DEVICES,
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        });
                }

                // Обновляем миссии
                const now = Date.now();
                if (now - G.missions.lastReset > 86400000 || !G.missions.active) {
                    const MISSIONS_DEF = [
                        { id: 'f8', nm: '🌾 Шахтёр', d: 'Добыть 8 раз', t: 8, tp: 'farm', rw: 1 },
                        { id: 's1', nm: '💎 Коллекционер', d: 'Найти осколок', t: 1, tp: 'shard', rw: 2 },
                        { id: 'w5', nm: '⚒️ Трудоголик', d: '5 работ', t: 5, tp: 'work', rw: 2 },
                        { id: 'r3', nm: '👥 Вербовщик', d: '3 реферала', t: 3, tp: 'ref', rw: 1 }
                    ];
                    G.missions.active = {};
                    const picked = [...MISSIONS_DEF].sort(() => Math.random() - .5).slice(0, 3);
                    picked.forEach(m => { G.missions.active[m.id] = { ...m, prog: 0, claimed: false }; });
                    G.missions.lastReset = now;
                    await saveUserData();
                }

                renderUI();
                renderDevices();
            } catch (e) {
                console.error('Ошибка загрузки:', e);
            }
        }

        async function updateDeviceActivity() {
            const now = new Date().toISOString();
            const deviceIndex = USER_DEVICES.findIndex(d => d.id === DEVICE_ID);
            if (deviceIndex !== -1) {
                USER_DEVICES[deviceIndex].last_active = now;
                USER_DEVICES[deviceIndex].current = true;
                USER_DEVICES.forEach((d, i) => {
                    if (i !== deviceIndex) d.current = false;
                });
            } else {
                USER_DEVICES.push({
                    id: DEVICE_ID,
                    name: DEVICE_NAME,
                    last_active: now,
                    current: true
                });
            }
            if (USER_DEVICES.length > 10) {
                USER_DEVICES = USER_DEVICES
                    .sort((a, b) => new Date(b.last_active) - new Date(a.last_active))
                    .slice(0, 10);
            }
            await saveUserData();
        }

        async function saveUserData() {
            if (!supabaseClient || !currentUserId) return;
            try {
                const { error } = await supabaseClient
                    .from('users')
                    .upsert({
                        id: currentUserId,
                        email: currentUser.email,
                        data: G,
                        boss: GLOBAL_BOSS,
                        devices: USER_DEVICES,
                        updated_at: new Date().toISOString()
                    });
                if (error) console.error('Ошибка сохранения:', error);
            } catch (e) {
                console.error('Ошибка сохранения:', e);
            }
        }

        function autoSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveUserData();
            }, 2000);
        }

        // ============================================================
        // 8. УПРАВЛЕНИЕ УСТРОЙСТВАМИ
        // ============================================================
        function renderDevices() {
            const currentEl = document.getElementById('currentDeviceName');
            const totalEl = document.getElementById('totalDevicesCount');
            if (currentEl) currentEl.textContent = DEVICE_NAME;
            if (totalEl) totalEl.textContent = USER_DEVICES.length;
        }

        function showDevices() {
            const modal = document.getElementById('MOD_devices');
            const list = document.getElementById('devicesModalList');
            if (!modal || !list) return;

            if (USER_DEVICES.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:10px;color:var(--tx2);">Нет устройств</div>';
            } else {
                list.innerHTML = USER_DEVICES
                    .sort((a, b) => {
                        if (a.current) return -1;
                        if (b.current) return 1;
                        return new Date(b.last_active) - new Date(a.last_active);
                    })
                    .map(d => {
                        const isCurrent = d.id === DEVICE_ID;
                        const time = new Date(d.last_active).toLocaleString();
                        return `<div style="display:flex;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--bd);">
                            <div>
                                <span>${d.name || '🌐 Устройство'}</span>
                                ${isCurrent ? ' <span style="color:var(--grn);font-size:11px;">✓ текущее</span>' : ''}
                                <div style="font-size:10px;color:var(--tx2);">последний вход: ${time}</div>
                            </div>
                            ${!isCurrent ? `<button class="btn bs" style="width:auto;padding:2px 8px;font-size:10px;min-height:20px;" onclick="removeDevice('${d.id}')">✕</button>` : ''}
                        </div>`;
                    }).join('');
            }

            modal.classList.add('active');
        }

        function closeDevicesMod() {
            document.getElementById('MOD_devices').classList.remove('active');
        }

        async function removeDevice(deviceId) {
            if (deviceId === DEVICE_ID) {
                toast('Нельзя удалить текущее устройство', 'err');
                return;
            }
            USER_DEVICES = USER_DEVICES.filter(d => d.id !== deviceId);
            await saveUserData();
            renderDevices();
            showDevices();
            toast('Устройство удалено', 'ok');
        }

        async function logoutAllDevices() {
            USER_DEVICES = USER_DEVICES.filter(d => d.id === DEVICE_ID);
            USER_DEVICES[0].current = true;
            await saveUserData();
            renderDevices();
            closeDevicesMod();
            toast('Все остальные устройства отвязаны', 'ok');
        }

        // ============================================================
        // 9. ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ============================================================
        function fmt(n) { return Math.round(n).toLocaleString('ru'); }

        function toast(msg, tp) {
            const el = document.getElementById('_t');
            if (!el) return;
            const colors = { ok: '#065f46', gld: '#92620a', err: '#7f1d1d', info: '#2e1065' };
            el.style.background = colors[tp] || colors.info;
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(el._x);
            el._x = setTimeout(() => el.classList.remove('show'), 2500);
        }

        function confirmAction(title, body, fn) {
            document.getElementById('M_title').textContent = title;
            document.getElementById('M_body').textContent = body;
            _pendingFn = fn;
            document.getElementById('MOD_wrap').classList.add('active');
            document.getElementById('M_ok').onclick = function() {
                closeMod();
                if (_pendingFn) { _pendingFn();
                    _pendingFn = null; }
            };
        }

        function closeMod() {
            document.getElementById('MOD_wrap').classList.remove('active');
        }

        function openNickModal() {
            document.getElementById('NK_inp').value = G.name;
            document.getElementById('MOD_nick').classList.add('active');
        }

        function closeNickMod() {
            document.getElementById('MOD_nick').classList.remove('active');
        }

        function saveNick() {
            const v = document.getElementById('NK_inp').value.trim();
            if (v.length < 3 || v.length > 16) { toast('3–16 символов', 'err'); return; }
            G.name = v;
            autoSave();
            renderUI();
            closeNickMod();
            toast('Ник изменён!', 'ok');
        }

        function openTelegram() {
            window.open('https://t.me/minercoinsf', '_blank');
        }

        function goSc(nm) {
            document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
            document.querySelectorAll('.nb').forEach(b => b.classList.remove('on'));
            const el = document.getElementById('sc-' + nm);
            if (el) el.classList.add('on');
            const nb = document.getElementById('NB_' + nm);
            if (nb) nb.classList.add('on');
            if (nm === 'games') setTimeout(() => drawRoulette(), 60);
            if (nm === 'top') renderTop('b');
            renderUI();
        }

        function gTab(t, el) {
            ['rl', 'dc', 'au'].forEach(x => {
                const d = document.getElementById('G_' + x);
                if (d) d.style.display = x === t ? 'block' : 'none';
                const tb = document.getElementById('GT_' + x);
                if (tb) tb.classList.remove('on');
            });
            if (el) el.classList.add('on');
            if (t === 'rl') setTimeout(() => drawRoulette(), 40);
            if (t === 'dc') setTimeout(() => updateDiceDisplay(0, null), 40);
        }

        function topTab(t, el) {
            document.querySelectorAll('.sc#sc-top .tab').forEach(e => e.classList.remove('on'));
            if (el) el.classList.add('on');
            renderTop(t);
        }

        function getFarmCost() { return [50, 100, 250, 500, 1000][Math.min(G.farmLv - 1, 4)]; }

        function setBannerImage(url) {
            const img = document.getElementById('BNR_img');
            if (!img) return;
            img.src = url;
            img.style.display = 'block';
            const ph = document.getElementById('BNR_ph');
            if (ph) ph.style.display = 'none';
            img.onerror = function() {
                this.style.display = 'none';
                if (ph) ph.style.display = 'flex';
            };
        }

        // ============================================================
        // 10. РЕФЕРАЛЬНАЯ СИСТЕМА
        // ============================================================
        async function useRefCode() {
            if (!supabaseClient) { toast('Подождите подключения', 'err'); return; }
            const code = document.getElementById('REF_INP').value.trim();
            if (!code) { toast('Введите код', 'err'); return; }
            if (code === G.refCode) { toast('Это ваш собственный код', 'err'); return; }
            if (G.activatedRef) { toast('Вы уже активировали код', 'err'); return; }

            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('id, data')
                    .eq('data->>refCode', code)
                    .limit(1);

                if (error || !data || data.length === 0) {
                    toast('Код не найден', 'err');
                    return;
                }

                G.activatedRef = code;
                G.refs++;
                G.coins += 25;
                G.refEarnings += 25;
                await saveUserData();
                renderUI();
                toast('Код активирован! +25 монет', 'gld');
                document.getElementById('ACTIVATED_REF').textContent = code;
                document.getElementById('REF_INP').value = '';
            } catch (e) {
                toast('Ошибка активации кода', 'err');
            }
        }

        // ============================================================
        // 11. РУЛЕТКА
        // ============================================================
        let roulRunning = false;

        function drawRoulette(angle, result) {
            const cv = document.getElementById('RC');
            if (!cv) return;
            const rect = cv.parentElement?.getBoundingClientRect();
            const w = rect ? rect.width - 4 : 360;
            cv.width = w;
            cv.height = 200;
            const ctx = cv.getContext('2d'),
                cx = w / 2,
                cy = 100,
                R = 78;
            ctx.clearRect(0, 0, w, 200);

            const segs = [];
            for (let i = 0; i < 9; i++) { segs.push('red');
                segs.push('black'); }
            segs.push('green', 'green');

            const n = segs.length;
            const a0 = angle || 0;
            segs.forEach((c, i) => {
                const a1 = a0 + i / n * Math.PI * 2,
                    a2 = a0 + (i + 1) / n * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, R, a1, a2);
                ctx.closePath();
                ctx.fillStyle = c === 'red' ? '#7f1d1d' : c === 'black' ? '#1a1a2e' : '#052e16';
                ctx.fill();
                ctx.strokeStyle = '#ffffff18';
                ctx.lineWidth = .8;
                ctx.stroke();
            });

            ctx.beginPath();
            ctx.arc(cx, cy, 18, 0, Math.PI * 2);
            ctx.fillStyle = result ? { red: '#ef4444', black: '#6b7280', green: '#10b981' } [result] : '#d0d0e0';
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(cx, cy - R - 12);
            ctx.lineTo(cx - 7, cy - R + 6);
            ctx.lineTo(cx + 7, cy - R + 6);
            ctx.closePath();
            ctx.fillStyle = '#f0b429';
            ctx.fill();
        }

        function startRoul(col) {
            if (roulRunning) { toast('Уже крутится!', 'err'); return; }
            const bet = parseInt(document.getElementById('RL_bet').value);
            if (G.coins < bet) { toast('Мало монет', 'err'); return; }

            confirmAction(`Ставка ${bet} монет на ${col==='red'?'красный':col==='black'?'чёрный':'зелёный'}?`,
                `Коэффициент: ${col==='green'?'×5':'×1.75'}. Шанс зелёного — 10%.`,
                async () => {
                    G.coins -= bet;
                    roulRunning = true;

                    const r = Math.random();
                    const landed = r < .4 ? 'red' : r < .8 ? 'black' : 'green';

                    const segs = [];
                    for (let i = 0; i < 9; i++) { segs.push('red');
                        segs.push('black'); }
                    segs.push('green', 'green');
                    const n = segs.length;
                    const possible = [];
                    segs.forEach((c, i) => { if (c === landed) possible.push(i); });
                    const targetIdx = possible[Math.floor(Math.random() * possible.length)];

                    const targetAngle = -(targetIdx + 0.5) / n * Math.PI * 2;
                    const total = targetAngle + Math.PI * 2 * (6 + Math.random() * 3);

                    const dur = 2800;
                    const t0 = Date.now();

                    function anim() {
                        const el = Date.now() - t0,
                            prog = Math.min(1, el / dur);
                        const ease = 1 - Math.pow(1 - prog, 3.5);
                        drawRoulette(ease * total, prog >= 1 ? landed : null);
                        if (prog < 1) {
                            requestAnimationFrame(anim);
                        } else {
                            roulRunning = false;
                            const multiplier = landed === 'green' ? 5 : 1.75;
                            const win = col === landed ? Math.floor(bet * multiplier) : 0;
                            if (win) G.coins += win;
                            const lbl = landed === 'red' ? 'красное' : landed === 'black' ? 'чёрное' : 'зелёное';
                            const resEl = document.getElementById('RL_res');
                            resEl.textContent = col === landed ?
                                `✅ ${lbl.charAt(0).toUpperCase()+lbl.slice(1)}! +${win} монет` :
                                `❌ ${lbl.charAt(0).toUpperCase()+lbl.slice(1)} — проигрыш`;
                            resEl.className = 'game-result ' + (col === landed ? 'win' : 'lose');
                            autoSave();
                            renderUI();
                            toast(col === landed ? `+${win} монет!` : 'Не повезло', col === landed ? 'gld' : 'err');
                        }
                    }
                    requestAnimationFrame(anim);
                });
        }

        // ============================================================
        // 12. КУБИК
        // ============================================================
        const DICE_FACES = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        let diceRolling = false;

        function updateDiceDisplay(val, color) {
            const el = document.getElementById('diceMain');
            if (el) {
                el.textContent = DICE_FACES[val] || '⚀';
                el.classList.remove('rolling');
                if (color === 'red') {
                    el.style.borderColor = '#ef4444';
                    el.style.boxShadow = '0 0 20px rgba(239,68,68,0.3)';
                } else if (color === 'black') {
                    el.style.borderColor = '#6b7280';
                    el.style.boxShadow = '0 0 20px rgba(107,114,128,0.3)';
                } else {
                    el.style.borderColor = 'var(--acc)';
                    el.style.boxShadow = 'none';
                }
            }
            document.getElementById('dcRed').className = color === 'red' ? 'active-red' : '';
            document.getElementById('dcBlack').className = color === 'black' ? 'active-black' : '';
        }

        function animateDiceRoll(callback) {
            const el = document.getElementById('diceMain');
            if (!el) { callback(); return; }
            el.classList.add('rolling');
            let count = 0;
            const maxCount = 20;
            const interval = setInterval(() => {
                el.textContent = DICE_FACES[Math.floor(Math.random() * 6)];
                count++;
                if (count >= maxCount) {
                    clearInterval(interval);
                    el.classList.remove('rolling');
                    callback();
                }
            }, 80);
        }

        function playDice(chosenColor) {
            if (diceRolling) return;
            if (G.coins < 50) { toast('Нужно 50 монет', 'err'); return; }
            G.coins -= 50;
            diceRolling = true;
            const resultEl = document.getElementById('DC_res');

            const diceValue = Math.floor(Math.random() * 6) + 1;
            const landedColor = diceValue % 2 === 1 ? 'red' : 'black';

            const baseWin = diceValue * 10;
            const bonusWin = chosenColor === landedColor ? 10 : 0;
            const totalWin = baseWin + bonusWin;

            animateDiceRoll(() => {
                updateDiceDisplay(diceValue - 1, landedColor);
                G.coins += totalWin;
                const profit = totalWin - 50;
                const colorName = landedColor === 'red' ? 'красный' : 'чёрный';
                const bonusText = bonusWin > 0 ? ` + бонус ${bonusWin} за цвет!` : ' (цвет не угадан)';
                resultEl.textContent = profit > 0 ?
                    `✅ Выпало ${diceValue} (${colorName})! Выигрыш +${profit} монет${bonusText}` :
                    `❌ Выпало ${diceValue} (${colorName}) — получено ${totalWin} монет`;
                resultEl.className = 'game-result ' + (profit > 0 ? 'win' : 'lose');
                diceRolling = false;
                autoSave();
                renderUI();
                toast(profit > 0 ? `+${profit} монет!` : 'Не повезло', profit > 0 ? 'gld' : 'err');
            });
        }

        function doFarm() {
            const now = Date.now();
            if (now - G.lastFarm < 3600000 && G.lastFarm) { toast('Кулдаун ещё не прошёл!', 'err'); return; }
            const mult = 1 + (G.farmLv - 1) * .2;
            const earned = Math.round((Math.floor(Math.random() * 5) + 1) * mult);
            G.coins += earned;
            G.farms++;
            G.lastFarm = now;
            const m = G.missions.active;
            if (m?.f8) m.f8.prog = Math.min(m.f8.t, (m.f8.prog || 0) + 1);
            let sm = '';
            const SHARDS = {
                'Осколок Вечности': { l: 1, c: .001 },
                'Кристалл Света': { l: 1, c: .001 },
                'Обсидиановая Слеза': { l: 2, c: .003 },
                'Ледяное Сердце': { l: 3, c: .006 },
                'Свет Луны': { l: 5, c: .015 },
                'Ткань Реальности': { l: 5, c: .015 }
            };
            for (const [nm, info] of Object.entries(SHARDS)) {
                if (Math.random() < info.c) {
                    G.shards[nm] = (G.shards[nm] || 0) + 1;
                    sm = `\n✨ ${nm}`;
                    if (m?.s1) m.s1.prog = 1;
                    break;
                }
            }
            autoSave();
            renderUI();
            toast(`+${earned} монет!${sm}`, 'gld');
        }

            const cost = getFarmCost();
            if (G.coins < cost) { toast('Недостаточно монет: нужно ' + cost, 'err'); return; }
            G.coins -= cost;
            G.farmLv++;

                    'Обсидиановая Слеза': { l: 2, c: .003 },
                    'Ледяное Сердце': { l: 3, c: .006 },
                    'Свет Луны': { l: 5, c: .015 },
                    'Ткань Реальности': { l: 5, c: .015 }
                };
                const sn = Object.keys(SHARDS)[Math.floor(Math.random() * Object.keys(SHARDS).length)];
